name: Create Release

on:
  push:
    tags:
      - 'v*'  # Ini akan memicu workflow pada tag dengan format v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.x

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    - name: Debug version variable
      run: echo "VERSION=${{ env.VERSION }}"

    - name: Restore dependencies for ZatcaEGS
      run: dotnet restore ZatcaEGS/ZatcaEGS.csproj

    - name: Restore dependencies for CFGenerator
      run: dotnet restore CFGenerator/CFGenerator.csproj

    - name: Update ZatcaEGS version
      run: |
        VERSION=${{ env.VERSION }}
        VERSION_FORMATTED=$(echo $VERSION | sed 's/-test//')
        echo "Updating to version: $VERSION_FORMATTED"
        sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>$VERSION_FORMATTED</AssemblyVersion>|g" ZatcaEGS/ZatcaEGS.csproj
        sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>$VERSION_FORMATTED</FileVersion>|g" ZatcaEGS/ZatcaEGS.csproj

    - name: Update CFGenerator version
      run: |
        VERSION=${{ env.VERSION }}
        VERSION_FORMATTED=$(echo $VERSION | sed 's/-test//')
        echo "Updating to version: $VERSION_FORMATTED"
        sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>$VERSION_FORMATTED</AssemblyVersion>|g" CFGenerator/CFGenerator.csproj
        sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>$VERSION_FORMATTED</FileVersion>|g" CFGenerator/CFGenerator.csproj

    - name: Build ZatcaEGS project
      run: dotnet build ZatcaEGS/ZatcaEGS.csproj --configuration Release

    - name: Build CFGenerator project
      run: dotnet build CFGenerator/CFGenerator.csproj --configuration Release

    - name: Publish ZatcaEGS
      run: dotnet publish ZatcaEGS/ZatcaEGS.csproj --configuration Release --output publish

    - name: Copy CFGenerator output to publish/CFGenerator folder
      run: |
        cp CFGenerator/bin/Release/net8.0/win-x64/* publish/CFGenerator/

    - name: Zip the publish folder
      run: zip -r ZatcaEGS_${{ env.VERSION }}.zip publish/*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ZatcaEGS_${{ env.VERSION }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
