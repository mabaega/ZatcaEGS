name: ZatcaEGS App Release

on:
  push:
    tags:
      - 'v*'

jobs:

  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore ZatcaEGS/ZatcaEGS.csproj
        
    - name: Build
      run: dotnet build ZatcaEGS/ZatcaEGS.csproj --configuration Release --no-restore
        
    - name: Publish
      run: dotnet publish ZatcaEGS/ZatcaEGS.csproj --configuration Release --output publish --no-build
        
    - name: Package Release Assets
      run: |
        Compress-Archive -Path publish/* -DestinationPath ZatcaEGS.zip
        Write-Host "Current directory: $(Get-Location)"
        Get-ChildItem -Path . -Recurse
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./ZatcaEGS.zip
        asset_name: ZatcaEGS.zip
        asset_content_type: application/zip