name: ZatcaEGS Build

on:
  push:
    tags:
      - 'v*'

jobs:

  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ZatcaEGS/ZatcaEGS.csproj

    - name: Build
      run: dotnet build ZatcaEGS/ZatcaEGS.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish ZatcaEGS/ZatcaEGS.csproj --configuration Release --output publish --no-build

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ZatcaEGS
        path: publish