name: Create Release

on:
  push:
    tags:
      - 'v*'  # This will trigger the workflow on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.x

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" | sed 's/^v//' >> $GITHUB_ENV

    - name: Restore dependencies for ZatcaEGS
      run: dotnet restore ZatcaEGS/ZatcaEGS.csproj

    - name: Restore dependencies for CFGenerator
      run: dotnet restore CFGenerator/CFGenerator.csproj

    - name: Update ZatcaEGS version
      run: |
        VERSION=${{ env.VERSION }}
        MAJOR_MINOR_PATCH=$(echo $VERSION | awk -F. '{print $1 "." $2 "." $3}')
        sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>$MAJOR_MINOR_PATCH.0</AssemblyVersion>|g" ZatcaEGS/ZatcaEGS.csproj
        sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>$MAJOR_MINOR_PATCH.0</FileVersion>|g" ZatcaEGS/ZatcaEGS.csproj

    # - name: Update CFGenerator version
    #   run: |
    #     VERSION=${{ env.VERSION }}
    #     MAJOR_MINOR_PATCH=$(echo $VERSION | awk -F. '{print $1 "." $2 "." $3}')
    #     sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>$MAJOR_MINOR_PATCH.0</AssemblyVersion>|g" CFGenerator/CFGenerator.csproj
    #     sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>$MAJOR_MINOR_PATCH.0</FileVersion>|g" CFGenerator/CFGenerator.csproj

    - name: Build ZatcaEGS project
      run: dotnet build ZatcaEGS/ZatcaEGS.csproj --configuration Release

    - name: Build CFGenerator project
      run: dotnet build CFGenerator/CFGenerator.csproj --configuration Release

    - name: Publish ZatcaEGS
      run: dotnet publish ZatcaEGS/ZatcaEGS.csproj --configuration Release --output publish

    - name: Copy CFGenerator output to publish folder
      run: |
        cp CFGenerator/bin/Release/net8.0/win-x64/CFGenerator.exe publish/
        cp CFGenerator/bin/Release/net8.0/win-x64/CFGenerator.dll publish/

    - name: Zip the publish folder
      run: zip -r ZatcaEGS_${{ env.VERSION }}.zip publish/*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ZatcaEGS_${{ env.VERSION }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
