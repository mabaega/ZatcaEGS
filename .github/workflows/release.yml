name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build ZatcaEGS project
      run: dotnet build ./ZatcaEGS/ZatcaEGS.csproj --configuration Release

    - name: Publish ZatcaEGS project
      run: dotnet publish ./ZatcaEGS/ZatcaEGS.csproj --configuration Release --output ./release/ZatcaEGS

    - name: Build CustomFieldAndFooterGenerator project
      run: dotnet build ./CustomFieldAndFooterGenerator/CustomFieldAndFooterGenerator.csproj --configuration Release

    - name: Publish CustomFieldAndFooterGenerator project
      run: dotnet publish ./CustomFieldAndFooterGenerator/CustomFieldAndFooterGenerator.csproj --configuration Release --output ./release/CustomFieldAndFooterGenerator

    - name: Package Files
      run: |
        mkdir -p ./release/ZatcaEGS
        cp ./release/CustomFieldAndFooterGenerator/CustomFieldAndFooterGenerator.exe ./release/ZatcaEGS/
        cp ./release/CustomFieldAndFooterGenerator/CustomFieldAndFooterGenerator.dll ./release/ZatcaEGS/
        cd ./release
        zip -r ZatcaEGS.zip ZatcaEGS

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: |
          ## Changelog
          * Automatically generated release

    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_content_type: application/zip
        asset_path: ./release/ZatcaEGS.zip
        asset_name: ZatcaEGS.zip
